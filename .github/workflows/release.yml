name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Update version in module.json
        run: |
          jq --arg v "$VERSION" '.version = $v' module.json > module.tmp.json
          mv module.tmp.json module.json

      - name: Build zip
        run: |
          zip -r module.zip . \
            --exclude "*.git*" \
            --exclude ".github/*" \
            --exclude ".gitignore"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            module.zip
            module.json
          generate_release_notes: true
